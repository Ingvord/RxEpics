services:
  epics-ioc:
    image: ghcr.io/epics-containers/epics-base-developer:7.0.10ec1
    environment:
      - EPICS_CA_ADDR_LIST=localhost
      - EPICS_CA_AUTO_ADDR_LIST=YES
    ports:
      - "5064:5064/tcp"
      - "5065:5065/tcp"
      - "5064:5064/udp"
      - "5065:5065/udp"
    volumes:
      - ./test.db:/test.db:ro
    command: /epics/epics-base/bin/linux-x86_64/softIoc -d /test.db
